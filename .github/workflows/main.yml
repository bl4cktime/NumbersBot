name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-notifier
  cancel-in-progress: true

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run notifier
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          # read stored id
          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except:
              old_id = ""

          print("CURRENT:", video_id)
          print("STORED:", old_id)

          if video_id == old_id:
              print("No new video")
              exit(0)

          print("NEW VIDEO DETECTED")

          # Discord send
          webhook = os.environ["DISCORD_WEBHOOK"]

          resp = requests.post(webhook, json={
              "content": "@everyone",
              "embeds": [{
                  "title": title,
                  "url": link,
                  "description": "🎥 New YouTube video uploaded!",
                  "color": 16711680,
                  "author": {
                      "name": channel_name,
                      "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                  },
                  "image": {
                      "url": f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"
                  }
              }],
              "allowed_mentions": {"parse": ["everyone"]}
          })

          print("Discord status:", resp.status_code)

          # update file
          with open("last_video.txt", "w") as f:
              f.write(video_id)

          print("Updated last_video.txt:", video_id)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add last_video.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update last video [skip ci]"
          git push origin HEAD:main
