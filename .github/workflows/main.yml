name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-notifier
  cancel-in-progress: false

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Video prüfen & Discord senden
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          gist_id = os.environ["GIST_ID"]
          token = os.environ["GH_TOKEN"]

          gist_api = f"https://api.github.com/gists/{gist_id}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }

          # -----------------------
          # 1. GIST lesen
          # -----------------------
          r = requests.get(gist_api, headers=headers)
          data = r.json()

          old_id = ""
          try:
              old_id = data["files"]["last_video.txt"]["content"].strip()
          except Exception:
              pass

          # -----------------------
          # 2. YouTube Feed
          # -----------------------
          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          print("Current:", video_id)
          print("Stored:", old_id)

          if video_id != old_id:

              print("New video detected")

              thumbnail_url = f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"

              webhook = os.environ["DISCORD_WEBHOOK"]

              requests.post(webhook, json={
                  "content": "@everyone",
                  "embeds": [{
                      "title": title,
                      "url": link,
                      "description": "🎥 New YouTube video uploaded!",
                      "color": 16711680,
                      "author": {
                          "name": channel_name,
                          "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                      },
                      "image": {
                          "url": thumbnail_url
                      }
                  }],
                  "allowed_mentions": {"parse": ["everyone"]}
              })

              # -----------------------
              # 3. GIST updaten
              # -----------------------
              requests.patch(
                  gist_api,
                  headers=headers,
                  json={
                      "files": {
                          "last_video.txt": {
                              "content": video_id
                          }
                      }
                  }
              )

              print("Gist updated:", video_id)

          else:
              print("No new video")
          EOF
