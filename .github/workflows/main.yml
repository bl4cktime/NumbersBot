name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: youtube-notifier
  cancel-in-progress: false

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Video prüfen & Discord senden
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}

        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          gist_id = os.environ["GIST_ID"]
          token = os.environ["GH_TOKEN"]

          gist_api = f"https://api.github.com/gists/{gist_id}"

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json"
          }

          # -----------------------
          # 1. GIST LESEN (robust)
          # -----------------------
          try:
              r = requests.get(gist_api, headers=headers, timeout=10)
              r.raise_for_status()
              data = r.json()
              old_id = data.get("files", {}).get("last_video.txt", {}).get("content", "").strip()
          except Exception as e:
              print("GIST READ ERROR:", str(e))
              old_id = ""

          # -----------------------
          # 2. YOUTUBE FEED
          # -----------------------
          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          print("Current video:", video_id)
          print("Stored video:", old_id)

          # -----------------------
          # 3. CHECK
          # -----------------------
          if video_id == old_id:
              print("No new video")
              exit(0)

          print("New video detected → sending Discord")

          thumbnail_url = f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"

          # -----------------------
          # 4. DISCORD
          # -----------------------
          webhook = os.environ["DISCORD_WEBHOOK"]

          discord_resp = requests.post(webhook, json={
              "content": "@everyone",
              "embeds": [{
                  "title": title,
                  "url": link,
                  "description": "🎥 New YouTube video uploaded!",
                  "color": 16711680,
                  "author": {
                      "name": channel_name,
                      "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                  },
                  "image": {
                      "url": thumbnail_url
                  }
              }],
              "allowed_mentions": {"parse": ["everyone"]}
          })

          print("Discord status:", discord_resp.status_code)

          # -----------------------
          # 5. GIST UPDATE (KRITISCH FIX)
          # -----------------------
          update_resp = requests.patch(
              gist_api,
              headers=headers,
              json={
                  "files": {
                      "last_video.txt": {
                          "content": video_id
                      }
                  }
              },
              timeout=10
          )

          print("GIST STATUS:", update_resp.status_code)
          print("GIST RESPONSE:", update_resp.text)

          if update_resp.status_code != 200:
              raise Exception("Gist update failed")

          print("Gist successfully updated:", video_id)

          EOF
