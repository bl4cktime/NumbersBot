name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Script ausführen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os
          from datetime import datetime

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://youtube.com{CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries found")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          # Neu: Beschreibung auslesen und auf 150 Zeichen kürzen
          summary = getattr(latest, "summary", "🎥 Klicke auf den Link, um das Video anzusehen!")
          if len(summary) > 150:
              summary = summary[:147] + "..."

          # Neu: Zeitstempel für den Discord-Footer formatieren
          published_parsed = getattr(latest, "published_parsed", None)
          if published_parsed:
              timestamp = datetime(*published_parsed[:6]).isoformat() + "Z"
          else:
              timestamp = datetime.utcnow().isoformat() + "Z"

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          thumbnail_url = f"https://youtube.com{video_id}/maxresdefault.jpg"
          
          # Neu: Generisches Icon für den Kanal-Author (oder ein festes Bild-URL eintragen)
          author_icon = "https://youtube.com"

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except FileNotFoundError:
              old_id = ""

          print(f"Current video: {video_id}")
          print(f"Stored video: {old_id}")

          if video_id != old_id:

              print("New video detected - sending notification")

              webhook = os.environ["DISCORD_WEBHOOK"]

              response = requests.post(
                  webhook,
                  json={
                      "content": "🎥 A new video has just been uploaded from " + channel_name + "!** @everyone",
                      "embeds": [
                          {
                              "title": title,
                              "url": link,
                              "description": f"*{summary}*",
                              "color": 16711680,
                              "timestamp": timestamp,
                              "author": {
                                  "name": channel_name,
                                  "url": f"https://youtube.com{CHANNEL_ID}",
                                  "icon_url": author_icon
                              },
                              "fields": [
                                  {
                                      "name": "🎬 Anschauen",
                                      "value": f"[▶️ Video auf YouTube öffnen]({link})",
                                      "inline": False
                                  }
                              ],
                              "image": {
                                  "url": thumbnail_url
                              },
                              "footer": {
                                  "text": "YouTube Notifier • Veröffentlicht"
                              }
                          }
                      ],
                      "allowed_mentions": {
                          "parse": ["everyone"]
                      }
                  }
              )

              print("Discord status:", response.status_code)

              with open("last_video.txt", "w") as f:
                  f.write(video_id)

              print(f"Saved video ID: {video_id}")

          else:
              print("No new video found")
          EOF

      - name: Änderungen (Korrektur: speichern)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          
          git add last_video.txt
          git diff --cached --quiet && exit 0
          
          git commit -m "Chore: Update latest video ID [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
