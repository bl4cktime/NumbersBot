name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Script ausführen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os
          from datetime import datetime

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://youtube.com{CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries found")
              exit(0)

          # HIER WAR DER FEHLER: Es muss der erste Eintrag [0] ausgewählt werden
          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          # Veröffentlichungszeitpunkt auslesen und für Discord formatieren
          published_parsed = getattr(latest, "published_parsed", None)
          if published_parsed:
              timestamp = datetime(*published_parsed[:6]).isoformat() + "Z"
          else:
              timestamp = datetime.utcnow().isoformat() + "Z"

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          # maxresdefault für die beste Bildqualität des Thumbnails
          thumbnail_url = f"https://youtube.com{video_id}/maxresdefault.jpg"

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except FileNotFoundError:
              old_id = ""

          print(f"Current video: {video_id}")
          print(f"Stored video: {old_id}")

          if video_id != old_id:
              print("New video detected - sending notification")
              webhook = os.environ["DISCORD_WEBHOOK"]

              # Verschönertes Embed-Layout für Discord
              payload = {
                  "content": "🔔 **Neues Video hochgeladen!** @everyone",
                  "embeds": [
                      {
                          "title": title,
                          "url": link,
                          "color": 16711680,  # YouTube Rot
                          "timestamp": timestamp,
                          "author": {
                              "name": f"📺 {channel_name}",
                              "url": f"https://youtube.com{CHANNEL_ID}"
                          },
                          "fields": [
                              {
                                  "name": "🔗 Jetzt anschauen",
                                  "value": f"[Hier klicken um das Video zu öffnen]({link})",
                                  "inline": False
                              }
                          ],
                          "image": {
                              "url": thumbnail_url
                          },
                          "footer": {
                              "text": "YouTube Notifier • Automatische Benachrichtigung"
                          }
                      }
                  ],
                  "allowed_mentions": {
                      "parse": ["everyone"]
                  }
              }

              response = requests.post(webhook, json=payload)
              print("Discord status:", response.status_code)

              with open("last_video.txt", "w") as f:
                  f.write(video_id)

              print(f"Saved video ID: {video_id}")
          else:
              print("No new video found")
          EOF

      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add last_video.txt
          
          # Wenn sich die Video-ID nicht geändert hat, beende hier ohne Fehler
          git diff --cached --quiet && exit 0
          
          git commit -m "Chore: Update latest video ID [skip ci]"
          
          # Vor dem Push die neuesten Änderungen holen, um Konflikte zu vermeiden
          git pull --rebase origin main
          git push origin HEAD:main
