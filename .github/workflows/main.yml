name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-notifier
  cancel-in-progress: false

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Video prüfen & Discord senden
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          LAST_VIDEO_ID: ${{ vars.LAST_VIDEO_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries found")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          old_id = os.environ.get("LAST_VIDEO_ID", "")

          print("Current video:", video_id)
          print("Stored video:", old_id)

          if video_id != old_id:

              print("New video detected")

              # ✔ stabile Thumbnail-URL (funktioniert fast immer)
              thumbnail_url = f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"

              webhook = os.environ["DISCORD_WEBHOOK"]

              requests.post(
                  webhook,
                  json={
                      "content": "@everyone",
                      "embeds": [
                          {
                              "title": title,
                              "url": link,
                              "description": "🎥 A new video has just been uploaded!",
                              "color": 16711680,

                              "author": {
                                  "name": channel_name,
                                  "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                              },

                              "image": {
                                  "url": thumbnail_url
                              },

                              "footer": {
                                  "text": "YouTube Upload Notifier"
                              }
                          }
                      ],
                      "allowed_mentions": {
                          "parse": ["everyone"]
                      }
                  }
              )

              print("Discord sent")

              # ✔ Update GitHub Variable (LAST_VIDEO_ID)
              repo = os.environ["REPO"]
              token = os.environ["GH_TOKEN"]

              requests.patch(
                  f"https://api.github.com/repos/{repo}/actions/variables/LAST_VIDEO_ID",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json"
                  },
                  json={"value": video_id}
              )

              print("Updated LAST_VIDEO_ID:", video_id)

          else:
              print("No new video")
          EOF
