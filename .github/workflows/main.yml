name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: youtube-notifier
  cancel-in-progress: true

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Video prüfen & Discord senden
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

        run: |
          python << 'EOF'
          import feedparser
          import requests

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except:
              old_id = ""

          print("Current:", video_id)
          print("Stored:", old_id)

          if video_id != old_id:

              print("New video detected")

              thumbnail_url = f"https://i.ytimg.com/vi/{video_id}/hqdefault.jpg"

              webhook = __import__("os").environ["DISCORD_WEBHOOK"]

              requests.post(webhook, json={
                  "content": "@everyone",
                  "embeds": [{
                      "title": title,
                      "url": link,
                      "description": "🎥 New YouTube video uploaded!",
                      "color": 16711680,
                      "author": {
                          "name": channel_name,
                          "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                      },
                      "image": {
                          "url": thumbnail_url
                      }
                  }],
                  "allowed_mentions": {"parse": ["everyone"]}
              })

              with open("last_video.txt", "w") as f:
                  f.write(video_id)

              print("Updated last_video.txt:", video_id)

          else:
              print("No new video")
          EOF

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add last_video.txt

          git diff --cached --quiet && exit 0

          git commit -m "Update last video [skip ci]"
          git push
