name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Script ausführen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          # 🔐 Safety check
          if not feed.entries:
              print("No feed entries found")
              exit(0)

          latest = feed.entries[0]

          video_id = getattr(latest, "yt_videoid", None)
          title = latest.title
          link = latest.link
          channel_name = latest.author

          if not video_id:
              video_id = link.split("v=")[-1]

          thumbnail_url = f"https://img.youtube.com/vi/{video_id}/maxresdefault.jpg"

          upload_time = getattr(latest, "published", None)

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except:
              old_id = ""

          if video_id != old_id:

              webhook = os.environ["DISCORD_WEBHOOK"]

              requests.post(
                  webhook,
                  json={
                      "content": "@everyone",
                      "embeds": [
                          {
                              "title": title,
                              "url": link,
                              "description": "📺 A new video has just been uploaded on YouTube.",
                              "color": 0xFF0000,

                              "author": {
                                  "name": channel_name,
                                  "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                              },

                              "thumbnail": {
                                  "url": thumbnail_url
                              },

                              "footer": {
                                  "text": "YouTube Upload Notifier • Auto Update"
                              },

                              "timestamp": upload_time if upload_time else None
                          }
                      ],
                      "allowed_mentions": {
                          "parse": ["everyone"]
                      }
                  }
              )

              with open("last_video.txt", "w") as f:
                  f.write(video_id)
          EOF

      - name: Änderungen speichern
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin main
          git reset --hard origin/main
          git add last_video.txt
          git commit -m "Update latest video" || exit 0
          git push
