name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Script ausführen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          )

          if not feed.entries:
              print("No feed entries found")
              exit(0)

          latest = feed.entries[0]

          title = latest.title
          link = latest.link
          channel_name = latest.author

          video_id = getattr(latest, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          thumbnail_url = f"https://img.youtube.com/vi/{video_id}/maxresdefault.jpg"

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except FileNotFoundError:
              old_id = ""

          print(f"Current video: {video_id}")
          print(f"Stored video: {old_id}")

          if video_id != old_id:

              print("New video detected - sending notification")

              webhook = os.environ["DISCORD_WEBHOOK"]

              response = requests.post(
                  webhook,
                  json={
                      "content": "@everyone",
                      "embeds": [
                          {
                              "title": title,
                              "url": link,
                              "description": "🎥 A new video has just been uploaded!",
                              "color": 16711680,

                              "author": {
                                  "name": channel_name,
                                  "url": f"https://www.youtube.com/channel/{CHANNEL_ID}"
                              },

                              "image": {
                                  "url": thumbnail_url
                              },

                              "footer": {
                                  "text": "YouTube Upload Notifier"
                              }
                          }
                      ],
                      "allowed_mentions": {
                          "parse": ["everyone"]
                      }
                  }
              )

              print("Discord status:", response.status_code)

              with open("last_video.txt", "w") as f:
                  f.write(video_id)

              print(f"Saved video ID: {video_id}")

          else:
              print("No new video found")
          EOF

      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Datei hinzufügen
          git add last_video.txt
          
          # Prüfen, ob es überhaupt Änderungen gibt (wenn kein neues Video da ist, hier beenden)
          git diff --cached --quiet && exit 0
          
          # Änderungen committen
          git commit -m "Chore: Update latest video ID [skip ci]"
          
          # Vor dem Push aktuelle Änderungen holen, um Konflikte zu vermeiden
          git pull --rebase origin main
          
          # Pushen
          git push origin HEAD:main
