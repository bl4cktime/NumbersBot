name: YouTube Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-video:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install feedparser requests

      - name: Script ausführen
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python << 'EOF'
          import feedparser
          import requests
          import os
          from datetime import datetime

          CHANNEL_ID = "UCCYvaiDx2FDf0clHmxRW2_Q"

          feed = feedparser.parse(
              f"https://youtube.com{CHANNEL_ID}"
          )

          if not feed.entries or len(feed.entries) == 0:
              print("Fehler: Keine Eintraege im RSS-Feed gefunden!")
              exit(1)

          # Holt das erste Video aus der Liste mithilfe von Index 0
          latest_video = feed.entries[0]

          title = latest_video.title
          link = latest_video.link
          channel_name = latest_video.author

          published_parsed = getattr(latest_video, "published_parsed", None)
          if published_parsed:
              timestamp = datetime(*published_parsed[:6]).isoformat() + "Z"
          else:
              timestamp = datetime.utcnow().isoformat() + "Z"

          video_id = getattr(latest_video, "yt_videoid", None)
          if not video_id:
              video_id = link.split("v=")[-1]

          thumbnail_url = f"https://youtube.com{video_id}/maxresdefault.jpg"

          try:
              with open("last_video.txt", "r") as f:
                  old_id = f.read().strip()
          except FileNotFoundError:
              old_id = ""

          print(f"Aktuelles Video: {video_id}")
          print(f"Gespeichertes Video: {old_id}")

          if video_id != old_id:
              print("Sende Benachrichtigung an Discord...")
              webhook = os.environ["DISCORD_WEBHOOK"]

              payload = {
                  "content": "🔔 **Neues Video hochgeladen!** @everyone",
                  "embeds": [
                      {
                          "title": title,
                          "url": link,
                          "color": 16711680,
                          "timestamp": timestamp,
                          "author": {
                              "name": f"📺 {channel_name}",
                              "url": f"https://youtube.com{CHANNEL_ID}"
                          },
                          "fields": [
                              {
                                  "name": "🔗 Jetzt anschauen",
                                  "value": f"[Hier klicken um das Video zu öffnen]({link})",
                                  "inline": False
                              }
                          ],
                          "image": {
                              "url": thumbnail_url
                          },
                          "footer": {
                              "text": "YouTube Notifier • Automatische Benachrichtigung"
                          }
                      }
                  ],
                  "allowed_mentions": {
                      "parse": ["everyone"]
                  }
              }

              response = requests.post(webhook, json=payload)
              print(f"Discord Status-Code: {response.status_code}")

              with open("last_video.txt", "w") as f:
                  f.write(video_id)
          else:
              print("Kein neues Video gefunden.")
          EOF

      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@://github.com"
          
          git add last_video.txt
          git diff --cached --quiet && exit 0
          
          git commit -m "Chore: Update latest video ID [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
